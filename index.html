<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Bot - Daily Motivation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1432 0%, #1e0a4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 600px; text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: 16px; color: #a78bfa; }
    p { font-size: 1.1rem; line-height: 1.7; color: #c4b5fd; margin-bottom: 24px; }
    .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    a {
      color: #7c3aed;
      text-decoration: none;
      padding: 10px 24px;
      border: 1px solid #7c3aed;
      border-radius: 8px;
      transition: all 0.2s;
    }
    a:hover { background: #7c3aed; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daily Quote Bot</h1>
    <p>
      แอปพลิเคชันสร้างคำคมแรงบันดาลใจภาษาไทย
      และเผยแพร่ผ่าน TikTok ทุกวัน
    </p>
    <div class="links">
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
